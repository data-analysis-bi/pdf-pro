<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDFPro — Offline PDF Tools</title>
  <link href="styles.css" rel="stylesheet" />
</head>

<body class="bg-gray-50 text-gray-900">

  <!-- Header -->
  <header class="py-6 text-center">
    <img src="assets/logo.png" width="80" class="mx-auto" />
    <h1 class="text-4xl font-bold mt-4">PDFPro</h1>
    <p class="text-lg text-gray-600">All PDF Tools in One Place — Fast, Private, Offline</p>
  </header>

  <!-- Hero -->
  <section class="text-center py-12">
    <img src="assets/banner.png" class="mx-auto rounded-lg shadow-lg" />
    <a href="/app" class="mt-6 inline-block bg-indigo-600 text-white px-6 py-3 rounded-lg text-lg">
      Open App
    </a>
  </section>

  <!-- Features -->
  <section class="max-w-4xl mx-auto py-12">
    <h2 class="text-3xl font-bold text-center mb-8">Features</h2>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
      <div class="p-6 bg-white shadow rounded-lg text-center">
        <h3 class="font-semibold text-xl">Merge PDFs</h3>
        <p class="text-gray-600 mt-2">Combine multiple files instantly.</p>
      </div>

      <div class="p-6 bg-white shadow rounded-lg text-center">
        <h3 class="font-semibold text-xl">Split PDFs</h3>
        <p class="text-gray-600 mt-2">Extract pages or ranges.</p>
      </div>

      <div class="p-6 bg-white shadow rounded-lg text-center">
        <h3 class="font-semibold text-xl">Compress PDFs</h3>
        <p class="text-gray-600 mt-2">Reduce file size efficiently.</p>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="py-6 text-center text-gray-500">
    © 2025 PDFPro — Built with React + Vite
  </footer>

</body>
</html>
